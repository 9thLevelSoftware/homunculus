[teacher]
# Local Ollama endpoint. Set up via scripts/phase5/setup.ps1
# (pulls qwen2.5-coder:14b-instruct-q4_K_M and starts `ollama serve`).
# api_key_env must be set to any non-empty value; setup.ps1 exports
# OPENAI_API_KEY=ollama-local at User scope.
provider = "openai-compatible"
model = "qwen2.5-coder:14b-instruct-q4_K_M"
base_url = "http://127.0.0.1:11434/v1"
endpoint = "/chat/completions"
api_key_env = "OPENAI_API_KEY"
temperature = 0.0
max_tokens = 4000
timeout_seconds = 180

[student]
model_id = "Qwen/Qwen2.5-Coder-3B-Instruct"
generate_command = ["python", "-m", "mlx_lm.generate"]
train_command = ["python", "-m", "mlx_lm.lora"]
max_tokens = 800
batch_size = 1
grad_accumulation_steps = 8
prompt_masking = true
qlora = true
adapter_root = "models/adapters"
timeout_seconds = 60
train_timeout_seconds = 3600

[memory]
base_url = "http://127.0.0.1:4200"
search_endpoint = "/search"
store_endpoint = "/store"
bearer_token_env = "ENGRAM_MCP_BEARER_TOKEN"
timeout_seconds = 10

[thresholds]
train_after_samples = 100
train_after_days = 7
max_self_generated_ratio = 0.5
min_eval_success_delta = 0.01
failure_growth_threshold = 2

[promotion]
allow_zero_canary_regressions = true
min_task_success_delta = 0.01
max_tool_misuse_increase = 0.0
max_retry_increase = 0.0

[paths]
root = "."
traces_dir = "traces"
datasets_dir = "datasets"
models_dir = "models"
runtime_dir = "runtime"
seed_sft_path = "datasets/seed/sft_seed.jsonl"
seed_dpo_path = "datasets/seed/dpo_seed.jsonl"

[dpo]
enabled = false
min_successful_sft_promotions = 3
env = { PYTORCH_ENABLE_MPS_FALLBACK = "1" }

[daemon]
enabled = true
cycle_interval_minutes = 480
max_episodes_per_cycle = 5
suggestions_dir = "suggestions"
target_workspace = "self"
auto_commit_on_accept = true

[introspection]
enabled = true
metrics_interval = 1      # Run metrics every cycle
critique_interval = 3     # Run critique every 3 cycles
coverage_interval = 5     # Run coverage every 5 cycles
comparative_interval = 3  # Run comparative every 3 cycles
window_size = 50          # Number of recent episodes to analyze
critique_enabled = true   # Set false to save API costs

[evolution]
auto_promote = true
auto_apply = true
auto_train_after_samples = 10   # lowered 50->10 for Phase 5 soak feasibility (2026-04-16)
auto_merge_after_loras = 2      # lowered 5->2 for Phase 5 soak feasibility (2026-04-16)
rollback_on_degradation = true

[guardrails]

[[guardrails.block_patterns]]
pattern = "rm\\s+-rf"
message = "Destructive recursive delete is blocked."

[[guardrails.warn_patterns]]
pattern = "git\\s+push\\s+--force"
message = "Force-push should be manually reviewed."

[workspaces.self]
path = "."

[[workspaces.self.verification_commands]]
name = "unit-tests"
kind = "test"
command = "python -m unittest discover -s tests -v"
timeout_seconds = 120

[[workspaces.self.verification_commands]]
name = "trace-smoke"
kind = "lint"
command = "python -c \"print('trace-smoke-pass')\""
timeout_seconds = 30

[canary]

[[canary.commands]]
name = "local-canary"
command = "python -c \"import json; print(json.dumps({'compile_pass_rate': 1.0, 'task_success_rate': 0.6, 'average_retries_to_success': 1.0, 'regression_count': 0, 'memory_usefulness_score': 0.5, 'tool_misuse_rate': 0.0}))\""
