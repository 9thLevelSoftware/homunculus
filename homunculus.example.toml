[teacher]
provider = "openai-compatible"
model = "gpt-5-mini"
base_url = "https://api.openai.com/v1"
endpoint = "/chat/completions"
api_key_env = "OPENAI_API_KEY"
temperature = 0.0
max_tokens = 4000
timeout_seconds = 60

[student]
model_id = "Qwen/Qwen2.5-Coder-3B-Instruct"
generate_command = ["python", "-m", "mlx_lm.generate"]
train_command = ["python", "-m", "mlx_lm.lora"]
max_tokens = 800
batch_size = 1
grad_accumulation_steps = 8
prompt_masking = true
qlora = true
adapter_root = "models/adapters"
timeout_seconds = 60
train_timeout_seconds = 3600

[memory]
base_url = "http://127.0.0.1:4200"
search_endpoint = "/search"
store_endpoint = "/store"
bearer_token_env = "ENGRAM_MCP_BEARER_TOKEN"
timeout_seconds = 10

[thresholds]
train_after_samples = 100
train_after_days = 7
max_self_generated_ratio = 0.5
min_eval_success_delta = 0.01
failure_growth_threshold = 2

[promotion]
allow_zero_canary_regressions = true
min_task_success_delta = 0.01
max_tool_misuse_increase = 0.0
max_retry_increase = 0.0

[paths]
root = "."
traces_dir = "traces"
datasets_dir = "datasets"
models_dir = "models"
runtime_dir = "runtime"
seed_sft_path = "datasets/seed/sft_seed.jsonl"
seed_dpo_path = "datasets/seed/dpo_seed.jsonl"

[dpo]
enabled = false
min_successful_sft_promotions = 3
env = { PYTORCH_ENABLE_MPS_FALLBACK = "1" }

[guardrails]

[[guardrails.block_patterns]]
pattern = "rm\\s+-rf"
message = "Destructive recursive delete is blocked."

[[guardrails.warn_patterns]]
pattern = "git\\s+push\\s+--force"
message = "Force-push should be manually reviewed."

[workspaces.self]
path = "."

[[workspaces.self.verification_commands]]
name = "unit-tests"
kind = "test"
command = "python -m unittest discover -s tests -v"
timeout_seconds = 120

[[workspaces.self.verification_commands]]
name = "trace-smoke"
kind = "lint"
command = "python -c \"print('trace-smoke-pass')\""
timeout_seconds = 30

[canary]

[[canary.commands]]
name = "local-canary"
command = "python -c \"import json; print(json.dumps({'compile_pass_rate': 1.0, 'task_success_rate': 0.6, 'average_retries_to_success': 1.0, 'regression_count': 0, 'memory_usefulness_score': 0.5, 'tool_misuse_rate': 0.0}))\""
